version: "3.9"

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: heat-postgis
    restart: unless-stopped
    environment:
      POSTGRES_DB: heat_backend
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
